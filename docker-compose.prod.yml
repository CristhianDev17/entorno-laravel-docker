services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod    # ← usa el nuevo, no el local
    image: tuusuario/tu-app-laravel:latest
    container_name: laravel-app
    ports:
      - "80:80"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-db_print_orders}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD}

      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      TZ: America/Lima
    volumes:
      # Solo storage persiste, el código está dentro de la imagen
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: laravel-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-db_print_orders}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MARIADB_CHARACTER_SET_SERVER: utf8mb4
      MARIADB_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: America/Lima
    volumes:
      - db_data:/var/lib/mysql
      - ./mariadb.cnf:/etc/mysql/conf.d/custom.cnf
    expose:
      - "3306"         # ← solo interno, no expuesto al exterior
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel-pma
    restart: "no"
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
      UPLOAD_LIMIT: 250M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel

volumes:
  db_data:
  storage_data:

networks:
  laravel:
    driver: bridge